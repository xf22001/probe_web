name: Build Probetool AAR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android-library:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.0'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      # 即使安装了特定版本，gomobile 可能会自动检测到环境中最新的 NDK (v27)
      # 但只要我们指定了 -androidapi 24，使用 NDK 27 就没问题
      run: sdkmanager --install "ndk;25.2.9519653"

    - name: Install Gomobile Toolchain
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    - name: Initialize Dependencies
      run: |
        if [ ! -f go.mod ]; then
          go mod init probetool
        fi
        go mod tidy

    - name: Prepare Code for Binding
      run: |
        echo "Converting package main to package probetool..."
        sed -i 's/package main/package probetool/' *.go
        # 删除 func main() {}
        sed -i 's/func main() {}//' *.go || true

    - name: Build AAR
      run: |
        # === 修复点在这里 ===
        # 添加 -androidapi 24
        #这会告诉 gomobile 针对 API 24 编译，而不是默认的 16
        # NDK 27 支持范围是 21..35，所以 24 是安全的
        
        gomobile bind -v -target=android -androidapi 24 -ldflags="-s -w" -o probetool.aar .

    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: probetool-lib
        path: |
          probetool.aar
          probetool-sources.jar
