name: Build Go Android AAR

on:
  workflow_dispatch:
  push:
    paths:
      - '**.go'
      - 'go.mod'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android SDK & NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install gomobile tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Initialize gomobile
        run: gomobile init
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Build AAR
        run: |
          if [ ! -f go.mod ]; then
            go mod init com.xiaofei.probetool
          fi
          
          # 下载 bind 依赖
          go get golang.org/x/mobile/bind

          gomobile bind -target=android -androidapi 24 -javapkg=com.xiaofei.probetool.lib -o main.aar .
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-aar
          path: main.aar
